services:
  - type: web
    name: nova-connect
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start -w @nova/api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 24.18.0
      - key: NODE_ENV
        value: production
      - key: PRODUCT_NAME
        value: NOVA Connect
      - key: CLIENT_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_DAYS
        sync: false
      - key: CALL_RECONNECT_GRACE_MS
        value: 12000
      - key: BCRYPT_ROUNDS
        value: 12
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAME_SITE
        value: lax
      - key: REQUIRE_EMAIL_VERIFICATION
        value: true
      - key: GOOGLE_AUTH_ENABLED
        sync: false
      - key: GOOGLE_AUTH_CLIENT_ID
        sync: false
      - key: VITE_GOOGLE_AUTH_ENABLED
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_PRODUCT_NAME
        value: NOVA Connect
      - key: VITE_PRODUCT_SHORT_NAME
        value: NOVA
      - key: VITE_PRODUCT_MARK
        value: N
      - key: VITE_PRODUCT_TAGLINE
        value: Stay in your orbit
      - key: VITE_PRODUCT_DESCRIPTION
        value: A private place for messages, calls, and the people who matter.
      - key: VITE_LEGAL_NAME
        sync: false
      - key: VITE_LEGAL_EMAIL
        sync: false
      - key: VITE_SUPPORT_EMAIL
        sync: false
      - key: VITE_STATUS_URL
        sync: false
      - key: VITE_TERMS_EFFECTIVE_DATE
        sync: false
      - key: MAIL_TRANSPORT
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REFRESH_TOKEN
        sync: false
      - key: GMAIL_SENDER
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: TURN_URL
        sync: false
      - key: TURN_SECRET
        sync: false
      - key: TURN_USERNAME
        sync: false
      - key: TURN_CREDENTIAL
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
