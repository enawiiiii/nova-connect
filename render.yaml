services:
  - type: web
    name: nova-connect
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start -w @nova/api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 24.18.0
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_DAYS
        value: 400
      - key: BCRYPT_ROUNDS
        value: 12
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAME_SITE
        value: lax
      - key: REQUIRE_EMAIL_VERIFICATION
        value: true
      - key: MAIL_TRANSPORT
        value: brevo
      - key: BREVO_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: TURN_URL
        sync: false
      - key: TURN_SECRET
        sync: false
      - key: TURN_USERNAME
        sync: false
      - key: TURN_CREDENTIAL
        sync: false
      - key: VAPID_PUBLIC_KEY
        value: BKfdmxVj3L9dWBJlEOl3uc4bt5JjmNLN1byeqZC8CdsL5PvOD6AosO-gBMyX3AM11K5sIySwbAh7EIa55Z1qsf4
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:AHMADMOM247@GMAIL.COM
